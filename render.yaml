services:
  # Backend API
  - type: web
    name: kmail-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kmail-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://kmail-frontend.onrender.com

  # Frontend
  - type: web
    name: kmail-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: kmail-backend
          type: web
          property: host

databases:
  - name: kmail-database
    plan: free
    databaseName: kmail
    user: kmail_user
